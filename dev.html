<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNGD Budget 2026 — Dashboard v4.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3ef; --surface: #ffffff; --surface2: #f0efe9; --border: #dddbd3;
    --text: #1a1917; --text2: #6b6860; --text3: #9e9c95;
    --blue: #1a56a0; --blue-light: #e8f0fb; --green: #0d7a5f; --green-light: #e4f5ef;
    --amber: #b45309; --red: #b91c1c; --red-light: #fee2e2;
    --radius: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans Thai', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--text); color: #fff; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: baseline; gap: 14px; }
  .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.45); font-family: 'IBM Plex Mono', monospace; }
  .header-right { display: flex; align-items: center; gap: 15px; }
  #loadBtn { background: var(--blue); color: #fff; border: none; padding: 7px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; font-weight: 500; }
  #statusBadge { font-size: 11px; font-family: 'IBM Plex Mono', monospace; padding: 4px 10px; border-radius: 99px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
  #statusBadge.ok { background: #14532d22; color: #4ade80; border: 1px solid #4ade8044; }

  /* ── Filters ── */
  .filters { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; }
  select { font-family: inherit; font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); min-width: 130px; }
  .btn-clear { font-size: 11px; color: var(--blue); background: none; border: 1px solid var(--blue); padding: 4px 8px; border-radius: 4px; cursor: pointer; }

  .main { padding: 20px 28px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; letter-spacing: -1px; }
  .kpi-value.blue { color: var(--blue); }
  .kpi-value.green { color: var(--green); }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .kpi-badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 99px; font-weight: 500; font-family: 'IBM Plex Mono', monospace; }
  .badge-over { background: var(--red-light); color: var(--red); }
  .badge-under { background: var(--green-light); color: var(--green); }

  /* ── Tracker ── */
  .tracker-box { padding: 15px; border-radius: 8px; text-align: center; }
  .tracker-box-label { font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .tracker-box-val { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
  .tracker-item { font-size: 11px; line-height: 1.4; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 10px; text-align: left; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .chart-wrap { position: relative; width: 100%; height: 240px; }
  .table-scroll { overflow-x: auto; max-height: 500px;}
  table.pivot { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
  table.pivot th { background: var(--surface2); color: var(--text2); font-weight: 600; padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;}
  table.pivot th:nth-child(-n+7) { text-align: left; }
  table.pivot td { padding: 6px 10px; text-align: right; border-bottom: 1px solid #f0ede6; }
  table.pivot tr.bg-odd td { background-color: #f7f6f1; }
  table.pivot tr.forecast-row td { color: var(--blue); } 
  table.pivot tr.actual-row td { color: var(--green); }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  .url-input-wrap { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius); padding: 4px 12px; min-width: 320px; }
  .url-input { background: transparent; border: none; color: rgba(255,255,255,0.8); font-size: 12px; font-family: 'IBM Plex Mono', monospace; flex: 1; outline: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">PNGD Budget 2026</span>
    <span class="header-sub">Forecast vs Actual</span>
  </div>
  <div class="header-right">
    <span id="lastUpdated" style="font-size: 11px; color: #4ade80; font-family: 'IBM Plex Mono', monospace;"></span>
    <div class="url-input-wrap">
      <input class="url-input" id="sheetUrl" placeholder="Google Sheet URL..." value="https://docs.google.com/spreadsheets/d/1Omvnc6JR4Ie0TIAz3DLON4zfdFICPSOTDMUKfCqk2U0">
    </div>
    <button id="loadBtn" onclick="loadData()">⟳ โหลดข้อมูล</button>
    <span id="statusBadge">ยังไม่ได้โหลด</span>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Filter</span>
  <button class="btn-clear" onclick="resetAllFilters()">ล้าง Filter ทั้งหมด</button>
  <select id="fAC" onchange="applyFilters()"><option value="">Activity Code ทั้งหมด</option></select>
  <select id="fBA" onchange="applyFilters()"><option value="">Budget Account ทั้งหมด</option></select>
  <select id="fCat" onchange="applyFilters()"><option value="">OPEX + CAPEX</option><option value="OPEX">OPEX</option><option value="CAPEX">CAPEX</option></select>
  <select id="fUser" onchange="applyFilters()"><option value="">User ทั้งหมด</option></select>
</div>

<div class="main">
  <div id="alertBox" style="display:none; background:#fee2e2; color:#b91c1c; padding:12px 16px; border-radius:var(--radius); margin-bottom:16px; font-size:13px; border-left:4px solid #b91c1c;"></div>
  
  <div class="kpi-row" id="kpiEl"></div>

  <div id="execSummary" class="card" style="border-left: 5px solid var(--blue); display:none;">
    <div class="card-header">
      <span class="card-title">EXECUTION TRACKER: <span id="currentAC"></span></span>
      <span id="execMonthHint" style="font-size:11px; color:var(--blue); font-weight:500;"></span>
    </div>
    <div class="card-body">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; align-items: start;">
        <div id="boxPR" class="tracker-box" style="background:#fdf2f2;"></div>
        <div id="boxPO" class="tracker-box" style="background:#fffbeb;"></div>
        <div id="boxActual" class="tracker-box" style="background:#f0fdf4;"></div>
      </div>
      <div style="background:var(--surface2); height:10px; border-radius:5px; margin-top:20px; overflow:hidden; border:1px solid var(--border);">
        <div id="progressBar" style="background:var(--green); height:100%; width:0; transition:0.6s cubic-bezier(0.1, 0.7, 0.1, 1);"></div>
      </div>
      <div id="progressText" style="font-size:11px; text-align:right; margin-top:6px; color:var(--text2); font-weight:500;"></div>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Forecast vs Actual รายเดือน</span>
        <button class="btn-clear" onclick="clearMonthFilter()">ล้างการเลือกเดือน</button>
      </div>
      <div class="card-body"><div class="chart-wrap"><canvas id="barChart"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">OPEX / CAPEX สัดส่วน</span>
        <div id="donutLegend" style="font-size:11px; color:var(--text2); display:flex; gap:10px;"></div>
      </div>
      <div class="card-body"><div class="chart-wrap"><canvas id="donutChart"></canvas></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title">DETAILED ANALYSIS (LINE BY LINE)</span><span id="rowCount" style="font-size:11px; color:var(--text3);"></span></div>
    <div class="card-body" style="padding:0;"><div id="pivotEl" class="table-scroll"></div></div>
  </div>
</div>

<script>
const MONTHS = ['01-Jan','02-Feb','03-Mar','04-Apr','05-May','06-June','07-July','08-Aug','09-Sep','10-Oct','11-Nov','12-Dec'];
const MLABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let RAW = [];
let barChart = null, donutChart = null;
let selectedMonths = []; 

function fmtN(v) { return v === 0 ? '—' : Math.round(v).toLocaleString('th-TH'); }
function fmtM(v) {
  if (v === 0) return '—';
  const a = Math.abs(v);
  const s = v < 0 ? '-' : '';
  if (a >= 1e6) return s + (a/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return s + Math.round(a/1e3) + 'K';
  return s + Math.round(a).toLocaleString();
}

async function loadData() {
  const url = document.getElementById('sheetUrl').value.trim();
  const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if (!idMatch) return;
  const apiUrl = `https://docs.google.com/spreadsheets/d/${idMatch[1]}/gviz/tq?tqx=out:json&sheet=Alldata`;
  try {
    const res = await fetch(apiUrl);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
    RAW = json.table.rows.map(r => {
      const row = {};
      json.table.cols.forEach((c, i) => {
        let val = r.c[i] ? r.c[i].v : '';
        if (typeof val === 'string' && ['Amount'].includes(c.label)) val = val.replace(/,/g, '');
        row[c.label] = val;
      });
      return row;
    }).filter(r => r['Activity Code']);
    document.getElementById('lastUpdated').innerText = `อัปเดต: ${new Date().toLocaleTimeString('th-TH')}`;
    document.getElementById('statusBadge').innerText = `✓ ${RAW.length} rows`;
    document.getElementById('statusBadge').className = 'ok';
    populateFilters(); applyFilters();
  } catch(e) { console.error(e); }
}

function populateFilters() {
  const getUniq = (key) => [...new Set(RAW.map(r => r[key]).filter(Boolean))].sort();
  const setOpts = (id, vals) => {
    const sel = document.getElementById(id);
    sel.innerHTML = sel.options[0].outerHTML;
    vals.forEach(v => { const o = document.createElement('option'); o.value = v; o.text = v; sel.appendChild(o); });
  };
  setOpts('fAC', getUniq('Activity Code'));
  setOpts('fBA', getUniq('Budget Account'));
  setOpts('fUser', getUniq('User'));
}

function applyFilters() {
  const ac = document.getElementById('fAC').value;
  const ba = document.getElementById('fBA').value;
  const cat = document.getElementById('fCat').value;
  const user = document.getElementById('fUser').value;
  
  const data = RAW.filter(r =>
    (!ac || r['Activity Code'] === ac) &&
    (!ba || String(r['Budget Account']) === ba) &&
    (!cat || r['Category (OPEX/CAPEX)'] === cat) &&
    (!user || r['User'] === user) &&
    (selectedMonths.length === 0 || selectedMonths.includes(r['Month']))
  );

  const chartData = RAW.filter(r => 
    (!ac || r['Activity Code'] === ac) &&
    (!ba || String(r['Budget Account']) === ba) &&
    (!cat || r['Category (OPEX/CAPEX)'] === cat) &&
    (!user || r['User'] === user)
  );

  renderKPIs(data);
  renderChart(chartData); 
  renderDonut(data);
  renderTable(data);
  updateExecSummary(data);

  if(document.getElementById('execMonthHint')) {
    document.getElementById('execMonthHint').innerText = selectedMonths.length > 0 ? `(ช่วงที่เลือก: ${selectedMonths.map(m => m.split('-')[1]).join(', ')})` : "";
  }
}

function updateExecSummary(data) {
    const acFilter = document.getElementById('fAC').value;
    if (!acFilter) { document.getElementById('execSummary').style.display = 'none'; return; }
    document.getElementById('execSummary').style.display = 'block';
    document.getElementById('currentAC').innerText = acFilter;

    let stats = { 'PR': { t: 0, i: [] }, 'Packing Forecast': { t: 0, i: [] }, 'Packing': { t: 0, i: [] } };
    const dynamicTarget = data.filter(r => r['Type'] === 'Forecast').reduce((s, r) => s + (parseFloat(r['Amount']) || 0), 0);

    data.forEach(r => {
        const amt = parseFloat(r['Amount']) || 0;
        if (stats[r['Status']] && amt > 0) {
            stats[r['Status']].t += amt;
            stats[r['Status']].i.push({ 
                d: r['Description'] || 'N/A', a: amt, mFull: r['Month'], mDisp: r['Month']?.split('-')[1] 
            });
        }
    });

    // 🔥 เรียงตาม Description และตาม Month จากต้นปีไปท้ายปี
    const sortLogic = (items) => {
        return items.sort((a, b) => {
            if (a.d < b.d) return -1;
            if (a.d > b.d) return 1;
            return MONTHS.indexOf(a.mFull) - MONTHS.indexOf(b.mFull);
        });
    };

    const makeBox = (title, color, key) => {
        const s = stats[key];
        const sorted = sortLogic(s.i);
        let h = `<div class="tracker-box-label" style="color:${color}">${title}</div>`;
        h += `<div class="tracker-box-val" style="color:${color}">${fmtM(s.t)}</div>`;
        if (sorted.length > 0) {
            h += `<div style="border-top:1px solid rgba(0,0,0,0.05); padding-top:8px;">`;
            sorted.forEach(item => {
                h += `<div class="tracker-item"><span style="color:var(--text2)">• ${item.d} (${item.mDisp})</span><span class="mono" style="font-weight:600">${fmtM(item.a)}</span></div>`;
            });
            h += `</div>`;
        } else { h += `<div style="font-size:10px; color:var(--text3)">— No Data —</div>`; }
        return h;
    };

    document.getElementById('boxPR').innerHTML = makeBox('STATUS: PR', '#991b1b', 'PR');
    document.getElementById('boxPO').innerHTML = makeBox('STATUS: FORECAST', '#92400e', 'Packing Forecast');
    document.getElementById('boxActual').innerHTML = makeBox('STATUS: PACKED (ACTUAL)', '#166534', 'Packing');

    const prog = dynamicTarget > 0 ? Math.min((stats['Packing'].t / dynamicTarget) * 100, 100).toFixed(1) : 0;
    document.getElementById('progressBar').style.width = progress + '%';
    document.getElementById('progressText').innerText = `ดำเนินการไปแล้ว ${prog}% (Target: ${fmtM(dynamicTarget)})`;
}

function renderKPIs(data) {
  const fc = data.filter(r => r['Type'] === 'Forecast').reduce((s, r) => s + (parseFloat(r['Amount']) || 0), 0);
  const ac = data.filter(r => r['Type'] === 'Actual').reduce((s, r) => s + (parseFloat(r['Amount']) || 0), 0);
  const variance = ac - fc;
  const pct = fc > 0 ? ((ac / fc) * 100).toFixed(1) : '0.0';
  const varBadge = variance > 0 ? `<span class="kpi-badge badge-over">+${fmtM(variance)} over</span>` : `<span class="kpi-badge badge-under">${fmtM(variance)} under</span>`;

  document.getElementById('kpiEl').innerHTML = `
    <div class="kpi"><div class="kpi-label">Total Forecast</div><div class="kpi-value blue">${fmtM(fc)}</div><div class="kpi-sub">฿${fmtN(fc)}</div></div>
    <div class="kpi"><div class="kpi-label">Total Actual</div><div class="kpi-value green">${fmtM(ac)}</div><div class="kpi-sub">฿${fmtN(ac)}</div></div>
    <div class="kpi"><div class="kpi-label">Utilization</div><div class="kpi-value">${pct}%</div><div class="kpi-sub">of budget used</div></div>
    <div class="kpi"><div class="kpi-label">Variance</div><div class="kpi-value" style="font-size:16px;">${varBadge}</div><div class="kpi-sub">฿${fmtN(Math.abs(variance))}</div></div>
    <div class="kpi"><div class="kpi-label">Transactions</div><div class="kpi-value">${data.length}</div><div class="kpi-sub">rows</div></div>
  `;
}

function renderChart(cData) {
  const getSum = (t) => MONTHS.map(m => cData.filter(r => r['Month'] === m && r['Type'] === t).reduce((s, r) => s + (parseFloat(r['Amount']) || 0), 0));
  const fV = getSum('Forecast'), aV = getSum('Actual');
  const uV = fV.map((f, i) => f > 0 ? (aV[i]/f*100).toFixed(1) : 0);
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    data: {
      labels: MLABELS,
      datasets: [
        { type: 'line', label: 'Util %', data: uV, borderColor: '#b45309', yAxisID: 'yP', tension: 0.3, pointRadius: 4 },
        { type: 'bar', label: 'Forecast', data: fV, yAxisID: 'yA', backgroundColor: (c) => selectedMonths.length === 0 || selectedMonths.includes(MONTHS[c.dataIndex]) ? 'rgba(26,86,160,0.7)' : 'rgba(26,86,160,0.15)', borderRadius: 4 },
        { type: 'bar', label: 'Actual', data: aV, yAxisID: 'yA', backgroundColor: (c) => selectedMonths.length === 0 || selectedMonths.includes(MONTHS[c.dataIndex]) ? 'rgba(13,122,95,0.75)' : 'rgba(13,122,95,0.15)', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (e, el) => { if(el.length > 0) { const m = MONTHS[el[0].index]; selectedMonths = selectedMonths.includes(m) ? selectedMonths.filter(x => x !== m) : [...selectedMonths, m]; applyFilters(); }},
      scales: { yA: { ticks: { callback: v => fmtM(v) } }, yP: { position: 'right', min: 0, grid: { drawOnChartArea: false }, ticks: { callback: v => v + '%' } } }
    }
  });
}

function renderDonut(data) {
  const op = data.filter(r => r['Category (OPEX/CAPEX)'] === 'OPEX').reduce((s,r)=>s+(parseFloat(r['Amount'])||0),0);
  const cp = data.filter(r => r['Category (OPEX/CAPEX)'] === 'CAPEX').reduce((s,r)=>s+(parseFloat(r['Amount'])||0),0);
  const tot = op + cp;
  if(donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart'), { type:'doughnut', data:{ labels:['OPEX','CAPEX'], datasets:[{ data:[op,cp], backgroundColor:['#b4530977','#7c3aed77'], borderColor:['#b45309','#7c3aed'], borderWidth:1.5 }]}, options:{ responsive:true, maintainAspectRatio:false, cutout:'70%' }});
  document.getElementById('donutLegend').innerHTML = `<span style="color:#b45309">● OPEX ${tot?(op/tot*100).toFixed(1):0}% — ${fmtM(op)}</span> <span style="color:#7c3aed">● CAPEX ${tot?(cp/tot*100).toFixed(1):0}% — ${fmtM(cp)}</span>`;
}

function renderTable(data) {
  const groups = {};
  data.forEach(r => { const k = `${r['Activity Code']}||${r['Budget Account']}`; if(!groups[k]) groups[k] = []; groups[k].push(r); });
  let h = `<table class="pivot"><thead><tr><th>Activity</th><th>Account</th><th>Cat</th><th>User</th><th>Status</th><th>Description</th><th>Type</th>${MLABELS.map(m=>`<th>${m}</th>`).join('')}<th>Total</th></tr></thead><tbody>`;
  let gIdx = 0;
  Object.keys(groups).sort().forEach(k => {
    const bg = gIdx++ % 2 === 0 ? 'bg-even' : 'bg-odd';
    const lines = {};
    groups[k].forEach(r => {
      const lk = `${r['Type']}||${r['User']}||${r['Status']}||${r['Description']}`;
      if(!lines[lk]) { lines[lk] = { ac:r['Activity Code'], ba:r['Budget Account'], cat:r['Category (OPEX/CAPEX)'], u:r['User'], s:r['Status'], d:r['Description'], t:r['Type'], m:{} }; MONTHS.forEach(mon => lines[lk].m[mon]=0); }
      lines[lk].m[r['Month']] += parseFloat(r['Amount'])||0;
    });
    Object.values(lines).sort((a,b) => a.t === 'Forecast' ? -1 : 1).forEach(l => {
      const tot = Object.values(l.m).reduce((a,b)=>a+b,0); if(tot===0 && l.t!=='Forecast') return;
      h += `<tr class="${bg} ${l.t==='Forecast'?'forecast-row':'actual-row'}"><td>${l.ac}</td><td class="mono">${l.ba}</td><td>${l.cat}</td><td>${l.u}</td><td>${l.s}</td><td style="white-space:normal; max-width:220px;">${l.d}</td><td>${l.t}</td>${MONTHS.map(mon=>`<td>${l.m[mon]?fmtN(l.m[mon]):'—'}</td>`).join('')}<td style="font-weight:600">${fmtN(tot)}</td></tr>`;
    });
  });
  document.getElementById('pivotEl').innerHTML = h + '</tbody></table>';
  document.getElementById('rowCount').innerText = `${data.length} rows`;
}

function resetAllFilters() {
    document.getElementById('fAC').value = ""; document.getElementById('fBA').value = ""; document.getElementById('fCat').value = ""; document.getElementById('fUser').value = "";
    selectedMonths = []; applyFilters();
}
function clearMonthFilter() { selectedMonths = []; applyFilters(); }
window.onload = loadData;
</script>
</body>
</html>
