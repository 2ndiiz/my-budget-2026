<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNGD Budget 2026 — Dashboard v2.5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3ef; --surface: #ffffff; --surface2: #f0efe9; --border: #dddbd3;
    --text: #1a1917; --text2: #6b6860; --text3: #9e9c95;
    --blue: #1a56a0; --blue-light: #e8f0fb; --green: #0d7a5f; --green-light: #e4f5ef;
    --amber: #b45309; --red: #b91c1c; --red-light: #fee2e2;
    --radius: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans Thai', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--text); color: #fff; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .header-title { font-size: 17px; font-weight: 600; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.45); font-family: 'IBM Plex Mono', monospace; }
  #loadBtn { background: var(--blue); color: #fff; border: none; padding: 7px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; font-weight: 500; }
  #statusBadge { font-size: 11px; font-family: 'IBM Plex Mono', monospace; padding: 4px 10px; border-radius: 99px; background: rgba(255,255,255,0.1); }
  #statusBadge.ok { background: #14532d22; color: #4ade80; border: 1px solid #4ade8044; }

  /* ── Filters ── */
  .filters { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  select { font-family: inherit; font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); min-width: 130px; }

  .main { padding: 20px 28px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; letter-spacing: -1px; }
  .kpi-value.blue { color: var(--blue); }
  .kpi-value.green { color: var(--green); }
  .kpi-badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 99px; font-weight: 500; }
  .badge-over { background: var(--red-light); color: var(--red); }
  .badge-under { background: var(--green-light); color: var(--green); }

  /* ── Charts & Tables ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text2); }
  .card-body { padding: 16px; }
  .chart-wrap { position: relative; width: 100%; height: 240px; }

  table.pivot { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
  table.pivot th { background: var(--surface2); color: var(--text2); font-weight: 600; padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;}
  table.pivot th:nth-child(-n+7) { text-align: left; }
  table.pivot td { padding: 6px 10px; text-align: right; border-bottom: 1px solid #f0ede6; }
  table.pivot tr.bg-odd td { background-color: #f7f6f1; }
  table.pivot tr.forecast-row td { color: var(--blue); } 
  table.pivot tr.actual-row td { color: var(--green); }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  .url-input-wrap { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius); padding: 4px 12px; min-width: 320px; }
  .url-input { background: transparent; border: none; color: rgba(255,255,255,0.8); font-size: 12px; font-family: 'IBM Plex Mono', monospace; flex: 1; outline: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">PNGD Budget 2026</span>
    <span class="header-sub">Execution Tracking Dashboard</span>
  </div>
  <div class="header-right">
    <span id="lastUpdated" style="font-size: 11px; color: #4ade80; font-family: 'IBM Plex Mono', monospace; margin-right: 15px;"></span>
    <div class="url-input-wrap">
      <input class="url-input" id="sheetUrl" placeholder="Google Sheet URL..." value="https://docs.google.com/spreadsheets/d/1Omvnc6JR4Ie0TIAz3DLON4zfdFICPSOTDMUKfCqk2U0">
    </div>
    <button id="loadBtn" onclick="loadData()">⟳ โหลดข้อมูล</button>
    <span id="statusBadge">พร้อมใช้งาน</span>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Filter</span>
  <select id="fAC" onchange="applyFilters()"><option value="">Activity Code ทั้งหมด</option></select>
  <select id="fBA" onchange="applyFilters()"><option value="">Budget Account ทั้งหมด</option></select>
  <select id="fCat" onchange="applyFilters()"><option value="">OPEX + CAPEX</option><option value="OPEX">OPEX</option><option value="CAPEX">CAPEX</option></select>
  <select id="fUser" onchange="applyFilters()"><option value="">User ทั้งหมด</option></select>
  <select id="fType" onchange="applyFilters()"><option value="">Forecast + Actual</option><option value="Forecast">Forecast</option><option value="Actual">Actual</option></select>
</div>

<div class="main">
  <div id="alertBox" style="display:none; background:#fee2e2; color:#b91c1c; padding:12px 16px; border-radius:var(--radius); margin-bottom:16px; font-size:13px; border-left:4px solid #b91c1c;"></div>
  
  <div class="kpi-row" id="kpiEl"></div>

  <div id="execSummary" class="card" style="border-left: 5px solid var(--blue); display:none;">
    <div class="card-header">
      <span class="card-title">EXECUTION TRACKER: <span id="currentAC"></span></span>
      <span id="monthHint" style="color:var(--blue); cursor:pointer; font-size:11px;" onclick="clearMonthFilter()"></span>
    </div>
    <div class="card-body">
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
        <div style="background:#fdf2f2; padding:12px; border-radius:8px; text-align:center;"><div style="font-size:10px; color:#b91c1c;">STATUS: PR</div><div id="sumPR" style="font-size:18px; font-weight:700; color:#b91c1c;">0</div></div>
        <div style="background:#fffbeb; padding:12px; border-radius:8px; text-align:center;"><div style="font-size:10px; color:#b45309;">STATUS: PO (FORECAST)</div><div id="sumPO" style="font-size:18px; font-weight:700; color:#b45309;">0</div></div>
        <div style="background:#f0fdf4; padding:12px; border-radius:8px; text-align:center;"><div style="font-size:10px; color:#15803d;">STATUS: PACKED (ACTUAL)</div><div id="sumActual" style="font-size:18px; font-weight:700; color:#15803d;">0</div></div>
      </div>
      <div style="background:var(--surface2); height:8px; border-radius:4px; margin-top:15px; overflow:hidden;">
        <div id="progressBar" style="background:var(--green); height:100%; width:0; transition:0.5s;"></div>
      </div>
      <div id="progressText" style="font-size:11px; text-align:right; margin-top:5px; color:var(--text2);"></div>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-header"><span class="card-title">Monthly Performance (คลิกเลือกหลายเดือนได้)</span></div>
      <div class="card-body"><div class="chart-wrap"><canvas id="barChart"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Expense Proportion</span><div id="donutLegend" class="legend" style="font-size:11px;"></div></div>
      <div class="card-body"><div class="chart-wrap"><canvas id="donutChart"></canvas></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title">DETAILED ANALYSIS</span></div>
    <div class="card-body" style="padding:0;"><div id="pivotEl" style="overflow-x:auto; max-height:500px;"></div></div>
  </div>
</div>

<script>
const MONTHS = ['01-Jan','02-Feb','03-Mar','04-Apr','05-May','06-June','07-July','08-Aug','09-Sep','10-Oct','11-Nov','12-Dec'];
const MLABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let RAW = [];
let barChart = null, donutChart = null;
let selectedMonths = []; // 🔥 เก็บสถานะการคลิกหลายเดือน 

function fmtM(v) {
  if (v === 0) return '—';
  const a = Math.abs(v);
  const s = v < 0 ? '-' : '';
  if (a >= 1e6) return s + (a/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return s + Math.round(a/1e3) + 'K';
  return s + Math.round(a).toLocaleString();
}

async function loadData() {
  const url = document.getElementById('sheetUrl').value.trim();
  const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if (!idMatch) return;
  const apiUrl = `https://docs.google.com/spreadsheets/d/${idMatch[1]}/gviz/tq?tqx=out:json&sheet=Alldata`;
  
  try {
    const res = await fetch(apiUrl);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
    RAW = json.table.rows.map(r => {
      const row = {};
      json.table.cols.forEach((c, i) => {
        let val = r.c[i] ? r.c[i].v : '';
        if (typeof val === 'string') val = val.replace(/,/g, '');
        row[c.label] = val;
      });
      return row;
    }).filter(r => r['Activity Code']);
    
    document.getElementById('lastUpdated').innerText = `อัปเดตล่าสุด: ${new Date().toLocaleTimeString('th-TH')} น.`;
    populateFilters();
    applyFilters();
  } catch(e) { console.error(e); }
}

function populateFilters() {
  const getUniq = (key) => [...new Set(RAW.map(r => r[key]).filter(Boolean))].sort();
  const setOpts = (id, vals) => {
    const sel = document.getElementById(id);
    sel.innerHTML = sel.options[0].outerHTML;
    vals.forEach(v => { const o = document.createElement('option'); o.value = v; o.text = v; sel.appendChild(o); });
  };
  setOpts('fAC', getUniq('Activity Code'));
  setOpts('fBA', getUniq('Budget Account'));
  setOpts('fUser', getUniq('User'));
}

function applyFilters() {
  const ac = document.getElementById('fAC').value;
  const ba = document.getElementById('fBA').value;
  const cat = document.getElementById('fCat').value;
  const user = document.getElementById('fUser').value;
  const type = document.getElementById('fType').value;
  
  const data = RAW.filter(r =>
    (!ac || r['Activity Code'] === ac) &&
    (!ba || String(r['Budget Account']) === ba) &&
    (!cat || r['Category (OPEX/CAPEX)'] === cat) &&
    (!user || r['User'] === user) &&
    (!type || r['Type'] === type) &&
    (selectedMonths.length === 0 || selectedMonths.includes(r['Month'])) // 🔥 Filter ตาม Array เดือน 
  );

  renderKPIs(data);
  renderChart(data);
  renderDonut(data);
  renderTable(data);
  checkAlerts(RAW);
  updateExecSummary(data);

  const hint = document.getElementById('monthFilterHint');
  if(hint) {
    hint.style.display = selectedMonths.length > 0 ? 'inline' : 'none';
    hint.innerHTML = `(เลือกอยู่: ${selectedMonths.map(m => m.split('-')[1]).join(', ')}) <u>[ล้าง]</u>`;
  }
}

function renderKPIs(data) {
  const fc = data.filter(r => r['Type'] === 'Forecast').reduce((s, r) => s + (parseFloat(r['Amount']) || 0), 0);
  const ac = data.filter(r => r['Type'] === 'Actual').reduce((s, r) => s + (parseFloat(r['Amount']) || 0), 0);
  const variance = ac - fc;
  const pct = fc > 0 ? ((ac / fc) * 100).toFixed(1) : '0.0';

  document.getElementById('kpiEl').innerHTML = `
    <div class="kpi"><div class="kpi-label">Forecast</div><div class="kpi-value blue">${fmtM(fc)}</div></div>
    <div class="kpi"><div class="kpi-label">Actual</div><div class="kpi-value green">${fmtM(ac)}</div></div>
    <div class="kpi"><div class="kpi-label">Utilization</div><div class="kpi-value">${pct}%</div></div>
    <div class="kpi"><div class="kpi-label">Variance</div><div class="kpi-badge ${variance > 0 ? 'badge-over' : 'badge-under'}">${fmtM(variance)}</div></div>
  `;
}

function renderChart(data) {
  const filterAC = document.getElementById('fAC').value;
  const getSum = (type) => MONTHS.map(m => RAW.filter(r => r['Month'] === m && r['Type'] === type && 
    (!filterAC || r['Activity Code'] === filterAC)
  ).reduce((s, r) => s + (parseFloat(r['Amount']) || 0), 0));

  const fcVals = getSum('Forecast');
  const acVals = getSum('Actual');
  const uV = fcVals.map((f, i) => f > 0 ? (acVals[i]/f*100).toFixed(1) : 0);

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    data: {
      labels: MLABELS,
      datasets: [
        { type: 'line', label: 'Util %', data: uV, borderColor: '#b45309', yAxisID: 'yPct', tension: 0.3, pointRadius: 4 },
        { type: 'bar', label: 'Forecast', data: fcVals, yAxisID: 'yAmt', backgroundColor: (c) => {
          const m = MONTHS[c.dataIndex];
          return selectedMonths.length === 0 || selectedMonths.includes(m) ? 'rgba(26,86,160,0.7)' : 'rgba(26,86,160,0.15)';
        }, borderRadius: 4 },
        { type: 'bar', label: 'Actual', data: acVals, yAxisID: 'yAmt', backgroundColor: (c) => {
          const m = MONTHS[c.dataIndex];
          return selectedMonths.length === 0 || selectedMonths.includes(m) ? 'rgba(13,122,95,0.75)' : 'rgba(13,122,95,0.15)';
        }, borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (e, elements) => {
        if (elements.length > 0) {
          const idx = elements[0].index;
          const month = MONTHS[idx];
          // 🔥 Logic Multi-select: ถ้ามีแล้วเอาออก ไม่มีให้เพิ่ม 
          if (selectedMonths.includes(month)) {
            selectedMonths = selectedMonths.filter(m => m !== month);
          } else {
            selectedMonths.push(month);
          }
          applyFilters();
        }
      },
      scales: {
        yAmt: { position: 'left', ticks: { callback: v => fmtM(v) } },
        yPct: { position: 'right', min: 0, grid: { drawOnChartArea: false }, ticks: { callback: v => v + '%' } }
      }
    }
  });
}

function updateExecSummary(data) {
  const summaryEl = document.getElementById('execSummary');
  const ac = document.getElementById('fAC').value;
  if (!ac) { summaryEl.style.display = 'none'; return; }
  
  summaryEl.style.display = 'block';
  document.getElementById('currentAC').innerText = ac;

  let pr = 0, po = 0, packed = 0;
  data.forEach(r => {
    const amt = parseFloat(r['Amount']) || 0;
    if (r['Status'] === 'PR') pr += amt;
    else if (r['Status'] === 'Packing Forecast') po += amt;
    else if (r['Status'] === 'Packing') packed += amt;
  });

  document.getElementById('sumPR').innerText = fmtM(pr);
  document.getElementById('sumPO').innerText = fmtM(po);
  document.getElementById('sumActual').innerText = fmtM(packed);
  
  // 🔥 Target Logic: OP-26-01 ใช้ 1.42M, อันอื่นใช้ Forecast รวมของช่วงที่เลือก [cite: 1, 3]
  const target = ac === 'OP-26-01' ? 1420000 : data.filter(r => r['Type'] === 'Forecast').reduce((s, r) => s + (parseFloat(r['Amount']) || 0), 0);
  const prog = target > 0 ? Math.min((packed / target) * 100, 100).toFixed(1) : 0;
  
  document.getElementById('progressBar').style.width = prog + '%';
  document.getElementById('progressText').innerText = `ดำเนินการเบิกจ่ายแล้ว ${prog}% ของเป้าหมายงานในช่วงที่เลือก (Target: ${fmtM(target)})`;
}

function renderTable(data) {
  const groups = {};
  data.forEach(r => {
    const key = `${r['Activity Code']}||${r['Budget Account']}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  let h = `<table class="pivot"><thead><tr><th>Activity</th><th>Account</th><th>Cat</th><th>User</th><th>Status</th><th>Desc</th><th>Type</th>${MLABELS.map(m=>`<th>${m.split('-')[1]}</th>`).join('')}<th>Total</th></tr></thead><tbody>`;
  let gIdx = 0;
  Object.keys(groups).sort().forEach(accKey => {
    const bgClass = gIdx % 2 === 0 ? 'bg-even' : 'bg-odd'; gIdx++;
    const lines = {};
    groups[accKey].forEach(r => {
      const lKey = `${r['Type']}||${r['User']}||${r['Status']}||${r['Description']}`;
      if (!lines[lKey]) {
        lines[lKey] = { ac: r['Activity Code'], ba: r['Budget Account'], cat: r['Category (OPEX/CAPEX)'], user: r['User'], status: r['Status'], desc: r['Description'], type: r['Type'], months: {} };
        MONTHS.forEach(m => lines[lKey].months[m] = 0);
      }
      lines[lKey].months[r['Month']] += parseFloat(r['Amount']) || 0;
    });

    Object.values(lines).sort((a,b) => a.type === 'Forecast' ? -1 : 1).forEach(l => {
      const total = Object.values(l.months).reduce((a,b)=>a+b, 0);
      if (total === 0 && l.type !== 'Forecast') return;
      h += `<tr class="${bgClass} ${l.type === 'Forecast' ? 'forecast-row' : 'actual-row'}">
        <td>${l.ac}</td><td class="mono">${l.ba}</td><td>${l.cat}</td><td>${l.user}</td><td>${l.status}</td>
        <td style="white-space:normal; max-width:200px; font-size:11px;">${l.desc}</td><td>${l.type}</td>
        ${MONTHS.map(m => `<td class="mono">${l.months[m] ? Math.round(l.months[m]).toLocaleString() : '—'}</td>`).join('')}
        <td class="mono" style="font-weight:600">${Math.round(total).toLocaleString()}</td>
      </tr>`;
    });
  });
  document.getElementById('pivotEl').innerHTML = h + '</tbody></table>';
}

function renderDonut(data) {
  const opex = data.filter(r => r['Category (OPEX/CAPEX)'] === 'OPEX').reduce((s,r) => s + (parseFloat(r['Amount']) || 0), 0);
  const capex = data.filter(r => r['Category (OPEX/CAPEX)'] === 'CAPEX').reduce((s,r) => s + (parseFloat(r['Amount']) || 0), 0);
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: { labels: ['OPEX', 'CAPEX'], datasets: [{ data: [opex, capex], backgroundColor: ['#b4530977', '#7c3aed77'], borderColor: ['#b45309', '#7c3aed'], borderWidth: 1.5 }]},
    options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
  });
  document.getElementById('donutLegend').innerHTML = `OPEX: ${fmtM(opex)} | CAPEX: ${fmtM(capex)}`;
}

function checkAlerts(allRaw) {
  const groups = {};
  allRaw.forEach(r => {
    const key = `${r['Activity Code']} (${r['Budget Account']})`;
    if (!groups[key]) groups[key] = { f: 0, a: 0 };
    if (r['Type'] === 'Forecast') groups[key].f += parseFloat(r['Amount']) || 0;
    if (r['Type'] === 'Actual') groups[key].a += parseFloat(r['Amount']) || 0;
  });
  const overs = Object.keys(groups).filter(k => groups[k].a > groups[k].f && groups[k].f > 0)
    .map(k => `• ${k} เกินแผน ${Math.round(groups[k].a - groups[k].f).toLocaleString()} ฿`);
  const box = document.getElementById('alertBox');
  if (overs.length > 0) { box.innerHTML = `🚨 <b>Over Budget:</b><br>` + overs.join('<br>'); box.style.display = 'block'; }
  else box.style.display = 'none';
}

function clearMonthFilter() { selectedMonths = []; applyFilters(); }
window.onload = loadData;
</script>
</body>
</html>
