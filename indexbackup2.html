<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNGD Budget 2026 — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #dddbd3;
    --text: #1a1917;
    --text2: #6b6860;
    --text3: #9e9c95;
    --blue: #1a56a0;
    --blue-light: #e8f0fb;
    --green: #0d7a5f;
    --green-light: #e4f5ef;
    --amber: #b45309;
    --amber-light: #fef3c7;
    --red: #b91c1c;
    --red-light: #fee2e2;
    --accent: #1a56a0;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans Thai', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--text); color: #fff; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: baseline; gap: 14px; }
  .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.45); font-family: 'IBM Plex Mono', monospace; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  #loadBtn { background: var(--blue); color: #fff; border: none; padding: 7px 16px; border-radius: var(--radius); font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 500; transition: opacity .15s; }
  #loadBtn:hover { opacity: .85; }
  #statusBadge { font-size: 11px; font-family: 'IBM Plex Mono', monospace; padding: 4px 10px; border-radius: 99px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
  #statusBadge.ok { background: #14532d22; color: #4ade80; border: 1px solid #4ade8044; }
  #statusBadge.err { background: #7f1d1d22; color: #f87171; border: 1px solid #f8717144; }

  /* ── Filters ── */
  .filters { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
  select { font-family: inherit; font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); cursor: pointer; min-width: 130px; }
  select:focus { outline: 2px solid var(--blue); outline-offset: 1px; }
  .filter-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

  /* ── Main layout ── */
  .main { padding: 20px 28px; }

  /* ── KPI row ── */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; letter-spacing: -1px; }
  .kpi-value.blue { color: var(--blue); }
  .kpi-value.green { color: var(--green); }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .kpi-badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 99px; font-weight: 500; font-family: 'IBM Plex Mono', monospace; }
  .badge-over { background: var(--red-light); color: var(--red); }
  .badge-under { background: var(--green-light); color: var(--green); }
  .badge-zero { background: var(--surface2); color: var(--text3); }

  /* ── Two-col layout ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--text2); }
  .card-body { padding: 16px; }

  /* ── Chart ── */
  .chart-wrap { position: relative; width: 100%; height: 240px; }

  /* ── Legend ── */
  .legend { display: flex; gap: 14px; font-size: 11px; color: var(--text2); }
  .leg { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* ── Pivot table ── */
  .table-scroll { overflow-x: auto; max-height: 600px;}
  table.pivot { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
  table.pivot th { background: var(--surface2); color: var(--text2); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;}
  table.pivot th:nth-child(-n+7) { text-align: left; }
  table.pivot td { padding: 6px 10px; text-align: right; border-bottom: 1px solid #f0ede6; vertical-align: top; color: var(--text); }
  table.pivot td.left { text-align: left; }
  table.pivot td.mono { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  
  /* 🔥 สีพื้นหลังสลับตามกลุ่ม Account Code */
  table.pivot tr.bg-even td { background-color: #ffffff; }
  table.pivot tr.bg-odd td { background-color: #f7f6f1; } 
  
  table.pivot tr.forecast-row td { color: var(--blue); } 
  table.pivot tr.actual-row td { color: var(--green); }
  table.pivot tr:hover td { background-color: var(--blue-light) !important; }
  
  .type-badge { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 99px; font-weight: 500; }
  .type-fc { background: var(--blue-light); color: var(--blue); }
  .type-ac { background: var(--green-light); color: var(--green); }
  .cat-opex { background: var(--amber-light); color: var(--amber); font-size: 10px; padding: 1px 6px; border-radius: 99px; }
  .cat-capex { background: #f3e8ff; color: #7c3aed; font-size: 10px; padding: 1px 6px; border-radius: 99px; }
  .desc-cell { max-width: 250px; white-space: normal; line-height: 1.4; font-size: 12px; }

  /* ── Loading state ── */
  .loading-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .url-input-wrap { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius); padding: 4px 4px 4px 12px; min-width: 320px; }
  .url-input { background: transparent; border: none; color: rgba(255,255,255,0.8); font-size: 12px; font-family: 'IBM Plex Mono', monospace; flex: 1; min-width: 0; outline: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">PNGD Budget 2026</span>
    <span class="header-sub">Forecast vs Actual</span>
  </div>
  <div class="header-right">
    <span id="lastUpdated" style="font-size: 11px; color: #4ade80; font-family: 'IBM Plex Mono', monospace; margin-right: 15px;"></span>
    <div class="url-input-wrap">
      <input class="url-input" id="sheetUrl" placeholder="วาง Google Sheet URL ที่นี่…" value="https://docs.google.com/spreadsheets/d/1Omvnc6JR4Ie0TIAz3DLON4zfdFICPSOTDMUKfCqk2U0">
    </div>
    <button id="loadBtn" onclick="loadData()">⟳ โหลดข้อมูล</button>
    <span id="statusBadge">ยังไม่ได้โหลด</span>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Filter</span>
  <select id="fAC" onchange="applyFilters()"><option value="">Activity Code ทั้งหมด</option></select>
  <select id="fBA" onchange="applyFilters()"><option value="">Budget Account ทั้งหมด</option></select>
  <select id="fCat" onchange="applyFilters()">
    <option value="">OPEX + CAPEX</option>
    <option value="OPEX">OPEX เท่านั้น</option>
    <option value="CAPEX">CAPEX เท่านั้น</option>
  </select>
  <select id="fUser" onchange="applyFilters()"><option value="">User ทั้งหมด</option></select>
  <div class="filter-sep"></div>
  <select id="fType" onchange="applyFilters()">
    <option value="">Forecast + Actual</option>
    <option value="Forecast">Forecast เท่านั้น</option>
    <option value="Actual">Actual เท่านั้น</option>
  </select>
</div>

<div class="main">
  <div id="appContent">
    <div class="loading-state">
      <div class="spinner"></div>
      <div style="font-weight:500; margin-bottom:6px;">กำลังดึงข้อมูลจาก Google Sheets...</div>
    </div>
  </div>
</div>

<script>
const MONTHS = ['01-Jan','02-Feb','03-Mar','04-Apr','05-May','06-June','07-July','08-Aug','09-Sep','10-Oct','11-Nov','12-Dec'];
const MLABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let RAW = [];
let barChart = null, donutChart = null;
let selectedMonth = ""; // 🔥 เก็บค่าเวลาคลิกเดือน

function extractSheetId(url) {
  const m = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  return m ? m[1] : null;
}

function fmtN(v) { return v === 0 ? '—' : Math.round(v).toLocaleString('th-TH'); }
function fmtM(v) {
  if (v === 0) return '—';
  const a = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  if (a >= 1e6) return sign + (a/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return sign + Math.round(a/1e3) + 'K';
  return sign + Math.round(a).toLocaleString();
}

async function loadData() {
  const url = document.getElementById('sheetUrl').value.trim();
  const sheetId = extractSheetId(url);
  if (!sheetId) { setStatus('URL ไม่ถูกต้อง', 'err'); return; }

  const btn = document.getElementById('loadBtn');
  btn.textContent = '…กำลังโหลด';
  btn.disabled = true;
  setStatus('กำลังโหลด…', '');

  const apiUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Alldata`;

  try {
    const res = await fetch(apiUrl);
    const text = await res.text();
    const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
    const json = JSON.parse(jsonString);
    
    RAW = parseGViz(json);
    setStatus(`✓ ${RAW.length} rows`, 'ok');
    
    // 🔥 อัปเดตเวลาล่าสุด
    const now = new Date();
    document.getElementById('lastUpdated').innerText = `อัปเดตล่าสุด: ${now.toLocaleTimeString('th-TH')} น.`;
    
    renderApp(); 
    populateFilters();
    applyFilters();
  } catch(e) {
    setStatus('โหลดไม่ได้ — ตรวจสอบ share settings', 'err');
    document.getElementById('appContent').innerHTML = `<div class="loading-state"><div style="font-size:24px;">⚠️</div><div style="margin-bottom:6px;font-weight:500;">ดึงข้อมูลไม่ได้</div><div style="font-size:12px;color:var(--text3);">ตรวจสอบว่า Google Sheet เปิด "Anyone with the link can view"<br>แล้วลองกด "โหลดข้อมูล" อีกครั้ง</div></div>`;
  }
  btn.textContent = '⟳ โหลดข้อมูล';
  btn.disabled = false;
}

function setStatus(msg, cls) {
  const el = document.getElementById('statusBadge');
  el.textContent = msg;
  el.className = cls ? `ok ${cls}` : '';
  if (cls === 'ok') el.className = 'ok';
  else if (cls === 'err') el.className = 'err';
  else el.className = '';
}

function parseGViz(json) {
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.filter(r => r).map(r => {
    const row = {};
    cols.forEach((c, i) => {
      const cell = r.c[i];
      let val = cell ? (cell.v !== null ? cell.v : '') : '';
      if (typeof val === 'string' && (c === 'Amount' || c === 'Forecast' || c === 'Actual')) {
        val = val.replace(/,/g, '');
      }
      row[c] = val;
    });

    if (row['Amount'] && !row['Forecast'] && row['Type'] === 'Forecast') row['Forecast'] = row['Amount'];
    if (row['Amount'] && !row['Actual'] && row['Type'] === 'Actual') row['Actual'] = row['Amount'];
    return row;
  }).filter(r => r['Activity Code']);
}

function populateFilters() {
  const getUniq = (key) => [...new Set(RAW.map(r => r[key]).filter(Boolean))].sort();
  const setOpts = (id, vals) => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = sel.options[0].outerHTML;
    vals.forEach(v => { const o = document.createElement('option'); o.value = v; o.text = v; sel.appendChild(o); });
    if (vals.includes(cur)) sel.value = cur;
  };
  setOpts('fAC', getUniq('Activity Code'));
  setOpts('fBA', getUniq('Budget Account'));
  setOpts('fUser', getUniq('User'));
}

function getFiltered() {
  const ac = document.getElementById('fAC').value;
  const ba = document.getElementById('fBA').value;
  const cat = document.getElementById('fCat').value;
  const user = document.getElementById('fUser').value;
  const type = document.getElementById('fType').value;
  
  return RAW.filter(r =>
    (!ac || r['Activity Code'] === ac) &&
    (!ba || String(r['Budget Account']) === ba) &&
    (!cat || r['Category (OPEX/CAPEX)'] === cat) &&
    (!user || r['User'] === user) &&
    (!type || r['Type'] === type) &&
    (!selectedMonth || r['Month'] === selectedMonth) // 🔥 กรองเดือน
  );
}

function applyFilters() {
  if (!RAW.length) return;
  const data = getFiltered();
  renderKPIs(data);
  renderChart(data);
  renderDonut(data);
  renderTable(data);
  checkAlerts(data); // 🔥 แจ้งเตือนงบเกิน
  
  // แสดงคำใบ้ว่ากรองเดือนอยู่
  const hint = document.getElementById('monthFilterHint');
  if(hint) {
     if(selectedMonth) { 
         const monName = selectedMonth.split('-')[1] || selectedMonth;
         hint.style.display = 'inline'; 
         hint.innerHTML = `(กรองข้อมูลเฉพาะ: ${monName}) <span style="text-decoration:underline;">[ล้าง]</span>`; 
     } else { 
         hint.style.display = 'none'; 
     }
  }
}

// 🔥 ล้าง Filter กราฟ
function clearMonthFilter() {
    selectedMonth = "";
    applyFilters();
}

// 🔥 ระบบแจ้งเตือน Over Budget
function checkAlerts(data) {
    const alertBox = document.getElementById('alertBox');
    if(!alertBox) return;

    const groups = {};
    data.forEach(r => {
        const key = r['Activity Code'] + ' (' + r['Budget Account'] + ')';
        if (!groups[key]) groups[key] = { f: 0, a: 0 };
        if (r['Type'] === 'Forecast') groups[key].f += parseFloat(r['Amount']) || 0;
        if (r['Type'] === 'Actual') groups[key].a += parseFloat(r['Amount']) || 0;
    });

    let alerts = [];
    for (let k in groups) {
        if (groups[k].a > groups[k].f && groups[k].f > 0) {
            alerts.push(`• <b>${k}</b> ใช้งบเกินแผนไป <b>${fmtN(groups[k].a - groups[k].f)} ฿</b>`);
        }
    }

    if (alerts.length > 0) {
        alertBox.innerHTML = `<div style="font-weight:600; margin-bottom:6px;">🚨 แจ้งเตือน: พบรายการใช้งบประมาณเกินแผน (Over Budget)</div>` + alerts.join('<br>');
        alertBox.style.display = 'block';
    } else {
        alertBox.style.display = 'none';
    }
}

function sumByMonth(data, typeVal, amtField) {
  const out = {};
  MONTHS.forEach(m => out[m] = 0);
  data.filter(r => !typeVal || r['Type'] === typeVal).forEach(r => {
    const m = r['Month'];
    if (out[m] !== undefined) out[m] += parseFloat(r[amtField] || r['Amount']) || 0;
  });
  return MONTHS.map(m => out[m]);
}

function renderKPIs(data) {
  const fc = data.filter(r => r['Type'] === 'Forecast').reduce((s, r) => s + (parseFloat(r['Forecast'] || r['Amount']) || 0), 0);
  const ac = data.filter(r => r['Type'] === 'Actual').reduce((s, r) => s + (parseFloat(r['Actual'] || r['Amount']) || 0), 0);
  const variance = ac - fc;
  const pct = fc > 0 ? ((ac / fc) * 100).toFixed(1) : '0.0';
  const varBadge = variance > 0
    ? `<span class="kpi-badge badge-over">+${fmtM(variance)} over</span>`
    : variance < 0
      ? `<span class="kpi-badge badge-under">${fmtM(variance)} under</span>`
      : `<span class="kpi-badge badge-zero">on budget</span>`;

  document.getElementById('kpiEl').innerHTML = `
    <div class="kpi"><div class="kpi-label">Total Forecast</div><div class="kpi-value blue">${fmtM(fc)}</div><div class="kpi-sub">฿${fmtN(fc)}</div></div>
    <div class="kpi"><div class="kpi-label">Total Actual</div><div class="kpi-value green">${fmtM(ac)}</div><div class="kpi-sub">฿${fmtN(ac)}</div></div>
    <div class="kpi"><div class="kpi-label">Utilization</div><div class="kpi-value">${pct}%</div><div class="kpi-sub">of budget used YTD</div></div>
    <div class="kpi"><div class="kpi-label">Variance</div><div class="kpi-value" style="font-size:16px;">${varBadge}</div><div class="kpi-sub">฿${fmtN(Math.abs(variance))}</div></div>
    <div class="kpi"><div class="kpi-label">Transactions</div><div class="kpi-value">${data.length}</div><div class="kpi-sub">rows in selection</div></div>
  `;
}

function renderChart(data) {
  const fcVals = sumByMonth(data, 'Forecast', 'Amount');
  const acVals = sumByMonth(data, 'Actual', 'Amount');
  
  const varPct = fcVals.map((f, i) => f > 0 ? (acVals[i] / f * 100).toFixed(1) : 0);

  if (barChart) barChart.destroy();
  const ctx = document.getElementById('barChart').getContext('2d');
  barChart = new Chart(ctx, {
    data: {
      labels: MLABELS,
      datasets: [
        { type: 'line', label: 'Utilization %', data: varPct, borderColor: '#b45309', yAxisID: 'yPct', tension: 0.3, pointRadius: 4, borderWidth: 2 },
        { type: 'bar', label: 'Forecast', data: fcVals, backgroundColor: 'rgba(26,86,160,0.7)', borderRadius: 3, barPercentage: 0.85, categoryPercentage: 0.7, yAxisID: 'yAmt' },
        { type: 'bar', label: 'Actual', data: acVals, backgroundColor: 'rgba(13,122,95,0.75)', borderRadius: 3, barPercentage: 0.85, categoryPercentage: 0.7, yAxisID: 'yAmt' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      // 🔥 ทำให้กราฟกดได้
      onClick: (e, elements) => {
        if (elements.length > 0) {
          const idx = elements[0].index;
          selectedMonth = MONTHS[idx];
          applyFilters();
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: { 
          callbacks: { label: c => ` ${c.dataset.label}: ${c.dataset.type === 'line' ? c.raw + '%' : '฿'+Math.round(c.raw).toLocaleString()}` } 
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#888' }, border: { display: false } },
        yAmt: { type: 'linear', position: 'left', grid: { color: 'rgba(0,0,0,0.05)' }, border: { display: false }, ticks: { font: { size: 10 }, color: '#888', callback: v => fmtM(v) } },
        yPct: { type: 'linear', position: 'right', min: 0, grid: { drawOnChartArea: false }, border: { display: false }, ticks: { font: { size: 10 }, color: '#b45309', callback: v => v + '%' } }
      }
    }
  });
}

function renderDonut(data) {
  const opex = data.filter(r => r['Category (OPEX/CAPEX)'] === 'OPEX').reduce((s,r) => s + (parseFloat(r['Amount']) || parseFloat(r['Forecast']) || parseFloat(r['Actual']) || 0), 0);
  const capex = data.filter(r => r['Category (OPEX/CAPEX)'] === 'CAPEX').reduce((s,r) => s + (parseFloat(r['Amount']) || parseFloat(r['Forecast']) || parseFloat(r['Actual']) || 0), 0);
  const total = opex + capex;
  const opexP = total > 0 ? ((opex/total)*100).toFixed(1) : 0;
  const capexP = total > 0 ? ((capex/total)*100).toFixed(1) : 0;

  if (donutChart) donutChart.destroy();
  const ctx = document.getElementById('donutChart').getContext('2d');
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['OPEX', 'CAPEX'],
      datasets: [{ data: [opex, capex], backgroundColor: ['#b4530977', '#7c3aed77'], borderColor: ['#b45309', '#7c3aed'], borderWidth: 1.5, hoverOffset: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.label}: ฿${Math.round(c.raw).toLocaleString()} (${c.label === 'OPEX' ? opexP : capexP}%)` } } }
    }
  });

  const legendEl = document.getElementById('donutLegend');
  if(legendEl) {
    legendEl.innerHTML = `
      <div class="leg"><span class="leg-dot" style="background:#b45309;"></span>OPEX ${opexP}% — ${fmtM(opex)}</div>
      <div class="leg"><span class="leg-dot" style="background:#7c3aed;"></span>CAPEX ${capexP}% — ${fmtM(capex)}</div>
    `;
  }
}

function renderTable(data) {
  const groups = {};
  data.forEach(r => {
    const ac = r['Activity Code'] || '—';
    const ba = r['Budget Account'] || '—';
    const accKey = `${ac}||${ba}`;
    if (!groups[accKey]) groups[accKey] = [];
    groups[accKey].push(r);
  });

  let html = `<table class="pivot">
    <thead><tr>
      <th class="left" style="min-width:85px;">Activity</th>
      <th class="left" style="min-width:90px;">Account</th>
      <th class="left" style="min-width:55px;">Cat</th>
      <th class="left" style="min-width:60px;">User</th>
      <th class="left" style="min-width:60px;">Status</th>
      <th class="left" style="min-width:180px;">Description</th>
      <th class="left" style="min-width:70px;">Type</th>
      ${MLABELS.map(m => `<th style="min-width:68px;">${m}</th>`).join('')}
      <th style="min-width:80px;">Total</th>
    </tr></thead><tbody>`;

  const sortedKeys = Object.keys(groups).sort();
  const filterType = document.getElementById('fType').value;

  let groupIndex = 0;

  sortedKeys.forEach(accKey => {
    const rows = groups[accKey];
    const lines = {};
    
    const bgClass = groupIndex % 2 === 0 ? 'bg-even' : 'bg-odd';
    groupIndex++;
    
    rows.forEach(r => {
      const type = r['Type'] || '—';
      const user = r['User'] || '—';
      const status = r['Status'] || '—'; 
      const desc = r['Description'] || '—';
      const cat = r['Category (OPEX/CAPEX)'] || '—';
      
      const lineKey = `${type}||${user}||${status}||${desc}||${cat}`;
      if (!lines[lineKey]) {
        lines[lineKey] = {
          ac: r['Activity Code'] || '—', ba: r['Budget Account'] || '—',
          cat, user, status, desc, type, months: {}
        };
        MONTHS.forEach(m => lines[lineKey].months[m] = 0);
      }
      lines[lineKey].months[r['Month']] += (parseFloat(r['Amount']) || 0);
    });

    const allLines = Object.values(lines);
    const fcLines = allLines.filter(l => l.type === 'Forecast');
    const acLines = allLines.filter(l => l.type !== 'Forecast');

    const renderLine = (l, isFc) => {
      const total = Object.values(l.months).reduce((a,b)=>a+b, 0);
      if(total === 0 && !isFc) return; 

      const baFmt = String(l.ba).replace(/\.0$/, '').replace(/(\d+)\.?\d*E\+?(\d+)/, (_, m, e) => String(parseInt(m) * Math.pow(10, parseInt(e)-7)));
      const catHtml = l.cat === 'OPEX' ? '<span class="cat-opex">OPEX</span>' : l.cat === 'CAPEX' ? '<span class="cat-capex">CAPEX</span>' : l.cat;

      html += `<tr class="${isFc ? 'forecast-row' : 'actual-row'} ${bgClass}">
        <td class="left mono">${l.ac}</td>
        <td class="left mono">${baFmt}</td>
        <td class="left">${catHtml}</td>
        <td class="left">${l.user}</td>
        <td class="left">${l.status}</td>
        <td class="left"><div class="desc-cell">${l.desc}</div></td>
        <td class="left"><span class="type-badge ${isFc ? 'type-fc' : 'type-ac'}">${l.type}</span></td>
        ${MONTHS.map(m => `<td class="mono" style="text-align:right">${l.months[m] ? fmtN(l.months[m]) : '—'}</td>`).join('')}
        <td class="mono" style="text-align:right; font-weight:600">${fmtN(total)}</td>
      </tr>`;
    };

    if (filterType !== 'Actual') fcLines.forEach(l => renderLine(l, true));
    if (filterType !== 'Forecast') acLines.forEach(l => renderLine(l, false));
  });

  html += '</tbody></table>';
  document.getElementById('pivotEl').innerHTML = html;
}
